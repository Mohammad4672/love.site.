<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💖 For Ruba</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#14001f,#25003a,#3a0060);
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* التاريخ */

#dateLove{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 30px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    color:white;
    font-size:24px;
    font-weight:bold;
    letter-spacing:2px;
    box-shadow:0 0 20px rgba(255,0,128,.3);
    z-index:999;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{
        transform:translateX(-50%) scale(1);
    }

    50%{
        transform:translateX(-50%) scale(1.05);
    }

    100%{
        transform:translateX(-50%) scale(1);
    }
}

/* الكارد */

.card{
    width:350px;
    padding:30px;
    border-radius:30px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    text-align:center;
    position:relative;
    box-shadow:0 0 30px rgba(255,0,128,.3);
}

.profile{
    width:90px;
    height:90px;
    border-radius:50%;
    margin:auto;
    margin-top:-70px;
    border:4px solid white;
    background:url('https://i.imgur.com/2DhmtJ4.jpeg');
    background-size:cover;
    background-position:center;
}

h1{
    margin-top:20px;
    font-size:40px;
}

p{
    opacity:.8;
    font-size:18px;
    line-height:1.8;
}

input{
    width:90%;
    padding:20px;
    border:none;
    outline:none;
    border-radius:20px;
    background:#0e0016;
    color:white;
    font-size:28px;
    text-align:center;
    margin-top:20px;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:20px;
    margin-top:20px;
    font-size:24px;
    background:#2d203d;
    color:white;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.03);
}

/* القلوب */

.heart{
    position:absolute;
    color:#ff4d88;
    animation:float 6s linear infinite;
    opacity:.7;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100vh);
    }
}

/* الرسالة السرية */

#secret{
    display:none;
    margin-top:20px;
    font-size:24px;
    color:#ffb3d9;
    line-height:1.8;
}

/* الرسائل النادرة */

#rareMessage{
    margin-top:20px;
    font-size:22px;
    color:#ffd6eb;
    min-height:40px;
    animation:fade 1s;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<!-- التاريخ -->

<div id="dateLove">
    25/04/2025 ❤️ | 3:21
</div>

<!-- الكارد -->

<div class="card">

<div class="profile"></div>

<h1>جاهزة 🤔</h1>

<p>
❤️ انتي أجمل قصة حب بحياتي وما بدي غيرك أبداً
</p>

<input id="pass" type="password" placeholder="1542004">

<button onclick="openLove()">
❤️😂 يلا بسرعة افتحي
</button>

<div id="secret">

💌<br><br>

"أنتِ أحلى شي صار بحياتي يا Ruba" ❤️

<div id="rareMessage"></div>

</div>

</div>

<script>

/* فتح الرسالة */

function openLove(){

    let pass = document.getElementById("pass").value;

    if(pass === "1542004"){

        document.getElementById("secret").style.display="block";

    }else{

        alert("غلط 😂❤️");

    }

}

/* القلوب */

for(let i=0;i<25;i++){

    let heart=document.createElement("div");

    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*30)+"px";
    heart.style.animationDuration=(3+Math.random()*5)+"s";

    document.body.appendChild(heart);
}

/* الرسائل النادرة */

const rareMessages = [

"💖 بحبك أكتر من لدرجة ما فيني اوصفلك",
"🌎 وجودك لحاله عالم كامل",
"💌 انتي أجمل صدفة بحياتي",
"❤️ كل دقيقة معك نعمة",
"🥹 ما بدي غيرك أبداً",
"✨ ضحكتك بتصلّح يومي",
"🌹 انتي الأمان بالنسبة الي",
"💞 قلبي اختارك من الكل",
"🫶  أحلى يوم كان اليوم يلي عرفتك فيه",

];

function showRareMessage(){

    let msg =
    rareMessages[Math.floor(Math.random()*rareMessages.length)];

    const box = document.getElementById("rareMessage");

    box.style.opacity = 0;

    setTimeout(()=>{

        box.innerHTML = msg;
        box.style.opacity = 1;

    },300);

}

showRareMessage();

setInterval(showRareMessage, 60000);

</script>

</body>
</html>
