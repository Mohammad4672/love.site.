<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💖 For Ruba</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#14001f,#25003a,#3a0060);
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* التاريخ */

#dateLove{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 30px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    color:white;
    font-size:24px;
    font-weight:bold;
    letter-spacing:2px;
    box-shadow:0 0 20px rgba(255,0,128,.3);
    z-index:999;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{
        transform:translateX(-50%) scale(1);
    }

    50%{
        transform:translateX(-50%) scale(1.05);
    }

    100%{
        transform:translateX(-50%) scale(1);
    }
}

/* الكارد */

.card{
    width:350px;
    padding:30px;
    border-radius:30px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    text-align:center;
    position:relative;
    box-shadow:0 0 30px rgba(255,0,128,.3);
}

.profile{
    width:90px;
    height:90px;
    border-radius:50%;
    margin:auto;
    margin-top:-70px;
    border:4px solid white;
    background:url('https://i.imgur.com/2DhmtJ4.jpeg');
    background-size:cover;
    background-position:center;
}

h1{
    margin-top:20px;
    font-size:40px;
}

p{
    opacity:.8;
    font-size:18px;
    line-height:1.8;
}

input{
    width:90%;
    padding:20px;
    border:none;
    outline:none;
    border-radius:20px;
    background:#0e0016;
    color:white;
    font-size:28px;
    text-align:center;
    margin-top:20px;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:20px;
    margin-top:20px;
    font-size:24px;
    background:#2d203d;
    color:white;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.03);
}

/* القلوب */

.heart{
    position:absolute;
    color:#ff4d88;
    animation:float 6s linear infinite;
    opacity:.7;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100vh);
    }
}

/* الرسائل */

#secret{
    display:none;
    margin-top:20px;
}

.message{
    display:none;
    margin-top:15px;
    font-size:22px;
    color:#ffd6eb;
    animation:fade 1s;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<!-- موسيقى -->

<audio autoplay loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mp3">
</audio>

<!-- التاريخ -->

<div id="dateLove">
    25/04/2025 ❤️ | 3:21
</div>

<!-- الكارد -->

<div class="card">

<div class="profile"></div>

<h1>جاهزة 🤔</h1>

<p>
❤️ انتي أجمل قصة حب بحياتي وما بدي غيرك أبداً
</p>

<input id="pass" type="password">

<button onclick="openLove()">
❤️😂 يلا بسرعة افتحي
</button>

<div id="secret">

<div class="message">💖 بحبك اكتر ما بتتخيلي</div>

<div class="message">🌎 وجودك لحاله عالم كامل</div>

<div class="message">💌 انتي أجمل صدفة بحياتي</div>

<div class="message">❤️ كل دقيقة معك نعمة</div>

<div class="message">🥹 ما بدي غيرك أبداً</div>

<div class="message">✨ ضحكتك بتصلّح يومي</div>

<div class="message">🌹 انتي الأمان بالنسبة الي</div>

<div class="message">💞 قلبي اختارك وما رح يختار غيرك</div>

<div class="message">🫶 أحلى شي يحياتي هوي وجودك</div>

</div>

</div>

<script>

/* فتح الرسائل */

function openLove(){

    let pass = document.getElementById("pass").value;

    if(pass === "1542004"){

        document.getElementById("secret").style.display="block";

    }else{

        alert("غلط 😂❤️");

    }

}

/* القلوب */

for(let i=0;i<25;i++){

    let heart=document.createElement("div");

    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*30)+"px";
    heart.style.animationDuration=(3+Math.random()*5)+"s";

    document.body.appendChild(heart);
}

/* الرسائل كل كبسة */

const messages = document.querySelectorAll(".message");

let current = 0;

document.body.addEventListener("click", ()=>{

    if(document.getElementById("secret").style.display === "block"){

        if(current < messages.length){

            messages[current].style.display = "block";

            current++;

        }

    }

});

</script>

</body>
</html>
